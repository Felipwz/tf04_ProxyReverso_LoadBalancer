# Configuração SSL/TLS Avançada - TF04 E-commerce
# Certificado self-signed para demonstração
server {
    listen 443 ssl http2;
    server_name localhost ecommerce.local;

    # Certificados SSL (self-signed)
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Configurações SSL modernas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;

    # SSL session cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    # Headers de segurança adicionais
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Frontend HTTPS via proxy
    location / {
        proxy_pass http://frontend_pool;

        # Headers SSL-aware
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;

        # Cache para arquivos estáticos
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend_pool;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API endpoints HTTPS com load balancing avançado
    location /api/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass http://ecommerce_backend;

        # Headers SSL para API
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Host $server_name;

        # Timeouts otimizados
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;

        # Failover automático
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;

        # Headers informativos SSL
        add_header X-Load-Balancer "nginx-least-conn-ssl" always;
        add_header X-Response-Time $request_time always;
        add_header X-SSL-Protocol $ssl_protocol always;
    }

    # Health check endpoint HTTPS
    location /health {
        proxy_pass http://ecommerce_backend;

        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;

        access_log off;
    }

    # Admin panel HTTPS com segurança adicional
    location /admin/ {
        limit_req zone=admin burst=5 nodelay;

        proxy_pass http://admin_pool/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        add_header X-Admin-Panel "true" always;
        add_header X-SSL-Admin "enabled" always;
    }

    # Status e métricas HTTPS
    location /nginx-status {
        stub_status on;
        access_log off;
        add_header Content-Type text/plain;
        add_header Access-Control-Allow-Origin *;
    }

    location /lb-info {
        return 200 '{
            "load_balancer": "nginx-ssl",
            "algorithm": "least_conn",
            "backend_pool": "ecommerce_backend",
            "instances": 3,
            "ssl_termination": "enabled",
            "ssl_protocol": "$ssl_protocol",
            "ssl_cipher": "$ssl_cipher",
            "features": [
                "ssl_termination",
                "http2_support",
                "automatic_failover",
                "hsts_enabled"
            ]
        }';
        add_header Content-Type application/json;
        add_header Access-Control-Allow-Origin *;
    }
}

# Redirecionamento HTTP -> HTTPS
server {
    listen 80;
    server_name ssl.ecommerce.local;

    # Permitir alguns endpoints em HTTP para flexibilidade
    location /health {
        proxy_pass http://ecommerce_backend;
        access_log off;
    }

    location /nginx-status {
        stub_status on;
        access_log off;
        add_header Content-Type text/plain;
    }

    # Redirecionar todo o resto para HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}