# Configuração principal do Load Balancer - TF04 E-commerce
# Virtual hosts e roteamento avançado com alta disponibilidade
server {
    listen 80;
    server_name localhost ecommerce.local;

    # Rate limiting e connection limiting globais
    limit_req zone=general burst=20 nodelay;
    limit_conn conn_limit_per_ip 10;

    # Headers de segurança
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Frontend - Servindo via proxy para container
    location / {
        proxy_pass http://frontend_pool;

        # Headers específicos para frontend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache para arquivos estáticos
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend_pool;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API endpoints com load balancing avançado
    location /api/ {
        # Rate limiting específico para API
        limit_req zone=api burst=10 nodelay;

        proxy_pass http://ecommerce_backend;

        # Headers específicos da API
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Timeouts otimizados
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;

        # Health check e failover automático
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;

        # Buffer settings otimizados
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Headers informativos de resposta
        add_header X-Load-Balancer "nginx-least-conn" always;
        add_header X-Response-Time $request_time always;
        add_header X-Upstream-Addr $upstream_addr always;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://ecommerce_backend;

        # Configurações específicas para health check
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;

        # Headers básicos
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Não logar health checks para reduzir ruído
        access_log off;
    }

    # Admin Panel com segurança adicional
    location /admin/ {
        # Rate limiting específico para admin (mais restritivo)
        limit_req zone=admin burst=5 nodelay;

        proxy_pass http://admin_pool/;

        # Headers completos para admin
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Identificação de admin panel
        add_header X-Admin-Panel "true" always;
    }

    # Nginx status para monitoramento
    location /nginx-status {
        stub_status on;
        access_log off;

        # Permitir acesso para demonstração (em produção, restringir)
        # allow 127.0.0.1;
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        # deny all;

        add_header Content-Type text/plain;
        add_header Access-Control-Allow-Origin *;  # Para AJAX do frontend
    }

    # Endpoint de informações detalhadas do load balancer
    location /lb-info {
        return 200 '{
            "load_balancer": "nginx",
            "algorithm": "least_conn",
            "backend_pool": "ecommerce_backend",
            "instances": 3,
            "health_checks": "enabled",
            "ssl_termination": "enabled",
            "gzip_compression": "enabled",
            "rate_limiting": "enabled",
            "features": [
                "automatic_failover",
                "connection_pooling",
                "request_buffering",
                "timeout_protection"
            ]
        }';
        add_header Content-Type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    # Error pages customizadas
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        return 404 '{"error": "Not Found", "message": "Endpoint não encontrado"}';
        add_header Content-Type application/json;
    }

    location = /50x.html {
        return 500 '{"error": "Server Error", "message": "Erro interno do servidor. Todas as instâncias podem estar indisponíveis."}';
        add_header Content-Type application/json;
    }
}